---
# continuous integration workflow based on old travis-ci configuration

name: CI

"on":
  push:
    branches:
      - master
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.1'
          bundler-cache: true

      - name: Lint
        run: bundle exec rake lint

  unit:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.1'
          bundler-cache: true

      - name: Unit tests
        run: bundle exec rake unit

      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          flag-name: unit

  interface:
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.1'
          bundler-cache: true

      - name: Interface snapshots
        run: bundle exec rake interface

  ruby-compatibility:
    needs: interface
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version:
          - '3.4.8'
          - '3.3.10'
          - '3.2.10'
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Compatibility tests
        run: |
          bundle exec rake unit
          bundle exec rake interface
